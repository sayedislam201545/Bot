<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0F172A;
            color: #F1F5F9;
            transition: all 0.3s;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1E293B;
        }
        ::-webkit-scrollbar-thumb {
            background: #F59E0B;
            border-radius: 10px;
        }
        
        #app {
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 80px;
            display: none;
        }
        
        /* Top Bar */
        .top-bar {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .top-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #F59E0B;
            object-fit: cover;
        }
        
        .user-info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .user-balance {
            font-size: 1.2rem;
            font-weight: 700;
            color: #F59E0B;
        }
        
        .user-balance span {
            font-size: 0.7rem;
            color: #94A3B8;
        }
        
        .icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .icon-btn:active {
            transform: scale(0.95);
            background: rgba(245, 158, 11, 0.2);
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 16px 20px;
            background: #1E293B;
            margin: 16px;
            border-radius: 24px;
        }
        
        .stat-card {
            text-align: center;
        }
        
        .stat-card i {
            font-size: 1.5rem;
            color: #F59E0B;
            margin-bottom: 6px;
        }
        
        .stat-card .value {
            font-size: 1.1rem;
            font-weight: 700;
        }
        
        .stat-card .label {
            font-size: 0.7rem;
            color: #94A3B8;
        }
        
        /* Section Title */
        .section-title {
            padding: 0 20px;
            margin-bottom: 12px;
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        /* Ad Platforms - Top Navigation */
        .ad-platforms {
            display: flex;
            gap: 8px;
            padding: 0 20px;
            margin-bottom: 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .ad-platforms::-webkit-scrollbar {
            display: none;
        }
        
        .platform-btn {
            padding: 8px 16px;
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 30px;
            color: #94A3B8;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .platform-btn.active {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            border-color: #F59E0B;
            color: white;
        }
        
        /* Ad Card */
        .ad-card {
            background: linear-gradient(135deg, #1E293B, #0F172A);
            border-radius: 24px;
            padding: 24px;
            margin: 0 20px 20px;
            text-align: center;
            border: 1px solid rgba(245, 158, 11, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .ad-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #F59E0B, #D97706, #F59E0B);
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .ad-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 12px;
            border-radius: 20px;
            object-fit: contain;
        }
        
        .ad-card h3 {

            margin-bottom: 6px;
        }
        
        .ad-card p {
            font-size: 0.8rem;
            color: #94A3B8;

        }
        
        .reward-text {
            font-size: 1rem;
            font-weight: 600;
            color: #F59E0B;
            margin-bottom: 16px;
        }
        
        .watch-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #F59E0B, #D97706);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .watch-btn:active {
            transform: scale(0.98);
        }
        
        .watch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .timer-text {
            font-size: 0.75rem;
            color: #94A3B8;
            margin-top: 10px;
        }
        
        /* Progress Bar */
        .progress-container {
            margin: 16px 20px;
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 6px;
            color: #94A3B8;
        }
        
        .progress-bar {
            height: 6px;
            background: #1E293B;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #F59E0B, #D97706);
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: #1E293B;
            display: flex;

        .nav-item {

        .nav-item i {

        }
        
        .nav-item.active {
            color: #F59E0B;
        }
        
        /* Pages */
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

        /* Bonus Tasks */
        .task-card {
            background: #1E293B;
            border-radius: 20px;
            padding: 16px;
            margin: 0 20px 12px;
            display: flex;
            gap: 14px;
            transition: all 0.2s;
        }
        
        .task-card:active {
            transform: scale(0.98);
        }
        
        .task-image {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            object-fit: cover;
        }
        
        .task-info {
            flex: 1;
        }
        
        .task-info h4 {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        
        .task-info p {
            font-size: 0.7rem;
            color: #94A3B8;
            margin-bottom: 6px;
        }
        
        .task-reward {
            font-size: 0.8rem;
            font-weight: 600;
            color: #F59E0B;
        }
        
        .task-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #F59E0B, #D97706);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            align-self: center;
        }
        
        .task-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Profile Page */
        .profile-header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1E293B, #0F172A);
            margin: 16px 20px;
            border-radius: 32px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #F59E0B;
            margin-bottom: 16px;
        }
        
        .referral-box {
            background: #1E293B;
            border-radius: 20px;
            padding: 16px;
            margin: 16px 20px;
            display: flex;
            gap: 10px;
        }
        
        .referral-box input {
            flex: 1;
            padding: 12px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 0.7rem;
        }
        
        .copy-btn {
            padding: 12px 20px;
            background: #F59E0B;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1E293B;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        
        /* Loader */
        .loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0F172A;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1E293B;
            border-top-color: #F59E0B;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .pending-banner {
            background: linear-gradient(135deg, #FEF3C7, #FDE68A);
            border-radius: 16px;
            padding: 12px 16px;
            margin: 0 20px 16px;
            color: #92400E;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<!-- Modal -->

    <div class="modal-content" id="modalContent"></div>
</div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
    apiKey: "AIzaSyB03K2JAA4iyBLgAX6Nv9Z0VMGX3qMGqBc",
    authDomain: "earnify-f3ac8.firebaseapp.com",
    databaseURL: "https://earnify-f3ac8-default-rtdb.firebaseio.com",
    projectId: "earnify-f3ac8",
    storageBucket: "earnify-f3ac8.firebasestorage.app",
    messagingSenderId: "273672601348",
    appId: "1:273672601348:web:4d627b5689575857345a51"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ==================== GLOBAL VARIABLES ====================
let tg = window.Telegram?.WebApp;
let tgUser = {};
let userState = {};
let appConfig = {};
let currentPlatform = 'monetag';
let rewardLock = false;
let adTimers = {};

// Ad platforms configuration
const adPlatforms = ['monetag', 'gigapub', 'adsgram', 'adexium'];

// ==================== HELPER FUNCTIONS ====================
function escapeHtml(s) {
    return String(s || '').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
}

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function showModal(title, message, onClose) {
    const modal = document.getElementById('modal');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
        <h3 style="margin-bottom: 12px; color: #F59E0B;">${title}</h3>
        <p style="margin-bottom: 20px;">${message}</p>
        <button class="watch-btn" onclick="closeModal()">OK</button>
    `;
    modal.style.display = 'flex';
    window.modalCallback = onClose;
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
    if (window.modalCallback) {
        window.modalCallback();
        window.modalCallback = null;
    }
}

async function addHistory(type, name, reward, status, message = "") {
    await db.ref(`users/${tgUser.id}/history`).push({
        type, name, reward, status, message,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    });
}

async function sendAdminNotification(msg) {
    let botToken = appConfig.botToken;
    let chatId = appConfig.adminChatId || '8705098472';
    if (!botToken || !chatId) return;
    try {
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: msg })
        });
    } catch (e) { }
}

async function processReferralEarnings(userId, earnedAmount, source) {
    if (!earnedAmount || earnedAmount <= 0) return;
    let userSnap = await db.ref(`users/${userId}`).once('value');
    let user = userSnap.val();
    if (!user || !user.referredBy) return;
    let referrerId = user.referredBy;
    let percent = parseFloat(appConfig.referralPercent) || 0;
    if (percent <= 0) return;
    let commission = (earnedAmount * percent) / 100;
    if (commission <= 0) return;
    await db.ref(`users/${referrerId}/earningWallet`).transaction(v => (v || 0) + commission);
    await addHistory('Referral Commission', `Commission from ${user.firstName} (${source})`, commission, 'Completed');
    await sendAdminNotification(`💰 Referral Commission\n👤 Referrer: ${user.firstName} (${userId})\n🎁 Earned: ${earnedAmount} Coins (${source})\n📈 Percent: ${percent}% → Commission: ${commission} Coins\n👑 To: ${referrerId}`);
}

// ==================== AD SYSTEMS ====================
async function loadAdScript(platform) {
    return new Promise((resolve) => {
        if (platform === 'monetag') {
            let zoneId = appConfig.monetagZoneId || '10806089';
            if (!window[`show_${zoneId}`]) {
                let script = document.createElement("script");
                script.src = "https://libtl.com/sdk.js";
                script.setAttribute("data-zone", zoneId);
                script.setAttribute("data-sdk", `show_${zoneId}`);
                script.onload = () => resolve(true);
                script.onerror = () => resolve(false);
                document.body.appendChild(script);
            } else {
                resolve(true);
            }
        } else if (platform === 'gigapub') {
            if (!window.showGiga) {
                let script = document.createElement("script");
                script.src = "https://ad.gigapub.tech/script?id=6234";
                script.onload = () => resolve(true);
                script.onerror = () => resolve(false);
                document.body.appendChild(script);
            } else {
                resolve(true);
            }
        } else if (platform === 'adsgram') {
            // Adsgram script placeholder
            resolve(true);
        } else if (platform === 'adexium') {
            // Adexium script placeholder
            resolve(true);
        } else {
            resolve(false);
        }
        
        setTimeout(() => resolve(false), 5000);
    });
}

async function runAd(platform) {
    let zoneId = appConfig.monetagZoneId || '10806089';
    
    if (platform === 'monetag') {
        if (window[`show_${zoneId}`]) {
            await window[`show_${zoneId}`]();
            return true;
        }
    } else if (platform === 'gigapub') {
        if (window.showGiga) {
            await window.showGiga("main");
            return true;
        }
    } else if (platform === 'adsgram') {
        // Adsgram ad run
        return true;
    } else if (platform === 'adexium') {
        // Adexium ad run
        return true;
    }
    return false;
}

async function watchAd(platform) {
    if (rewardLock) {
        showModal("Please wait", "Previous transaction is processing...");
        return;
    }
    
    // Check if ad is enabled
    let adSettings = appConfig.adSettings || {};
    if (adSettings[platform] === false) {
        showModal("Ad Unavailable", "This ad platform is currently disabled. Please try another one.");
        return;
    }
    
    // Check daily limit
    let dailyLimit = appConfig[`${platform}DailyLimit`] || 25;
    let currentCount = userState[`${platform}AdCount`] || 0;
    if (currentCount >= dailyLimit) {
        showModal("Limit Reached", `Daily ${platform.toUpperCase()} ad limit reached (${dailyLimit}/day)`);
        return;
    }
    
    // Check break system
    let breakAfter = appConfig[`${platform}BreakAfter`] || 5;
    let breakDuration = appConfig[`${platform}BreakDuration`] || 300;
    let breakEnd = userState[`${platform}BreakEnd`] || 0;
    let adCountSinceBreak = userState[`${platform}AdCountSinceBreak`] || 0;
    
    if (adCountSinceBreak >= breakAfter && Date.now() < breakEnd) {
        let remaining = Math.ceil((breakEnd - Date.now()) / 1000);
        showModal("Cooldown Active", `Please wait ${formatTime(remaining)} before watching more ads.`);
        return;
    }
    
    rewardLock = true;
    
    // Show loading
    showModal("Loading Ad", "Please wait while we load the advertisement...");
    
    // Load ad script if needed
    await loadAdScript(platform);
    
    closeModal();
    
    // Show ad confirmation
    let popupMsg = appConfig.adsPopupMessage || "Watch the ad carefully. You will receive reward after completion.";
    showModal("Watch Ad", popupMsg, async () => {
        showModal("Playing Ad", "Advertisement is playing...");
        
        let success = false;
        for (let i = 0; i < 2; i++) {
            success = await runAd(platform);
            if (success) break;
            await new Promise(r => setTimeout(r, 1000));
        }
        
        closeModal();
        
        if (success) {
            let reward = appConfig[`${platform}Reward`] || 10;
            
            // Update user state
            userState.earningWallet = (userState.earningWallet || 0) + reward;
            userState[`${platform}AdCount`] = currentCount + 1;
            userState[`${platform}AdCountSinceBreak`] = adCountSinceBreak + 1;
            userState.dailyAdCount = (userState.dailyAdCount || 0) + 1;
            userState.lifetimeAdCount = (userState.lifetimeAdCount || 0) + 1;
            userState.totalEarned = (userState.totalEarned || 0) + reward;
            
            // Update break timer
            if ((adCountSinceBreak + 1) >= breakAfter) {
                userState[`${platform}BreakEnd`] = Date.now() + (breakDuration * 1000);
                userState[`${platform}AdCountSinceBreak`] = 0;
            }
            
            // Save to Firebase
            await db.ref(`users/${tgUser.id}`).update({
                earningWallet: userState.earningWallet,
                [`${platform}AdCount`]: userState[`${platform}AdCount`],
                [`${platform}AdCountSinceBreak`]: userState[`${platform}AdCountSinceBreak`],
                [`${platform}BreakEnd`]: userState[`${platform}BreakEnd`],
                dailyAdCount: userState.dailyAdCount,
                lifetimeAdCount: userState.lifetimeAdCount,
                totalEarned: userState.totalEarned
            });
            
            await addHistory('Watch Ad', `Watched ${platform.toUpperCase()} Ad`, reward, 'Completed');
            await processReferralEarnings(tgUser.id, reward, `${platform.toUpperCase()} Ad`);
            await sendAdminNotification(`📺 ${platform.toUpperCase()} Ad Watched\nUser: ${userState.firstName} (${tgUser.id})\nReward: ${reward} Coins`);
            
            showModal("Success!", `🎉 +${reward} Coins earned!`);
            renderAll();
        } else {
            showModal("Failed", "Ad failed to load. Please try again.");
        }
        
        rewardLock = false;
    });
}

// ==================== BONUS TASKS ====================
async function loadBonusTasks() {
    let snap = await db.ref('bonusTasks').once('value');
    let tasks = [];
    snap.forEach(c => tasks.push({ key: c.key, ...c.val() }));
    return tasks;
}

async function renderBonusTasks() {
    let tasks = await loadBonusTasks();
    let userCompletions = (await db.ref(`users/${tgUser.id}/bonusTaskCompletions`).once('value')).val() || {};
    let container = document.getElementById('bonusTasksContainer');
    
    if (!container) return;
    
    if (tasks.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:#94A3B8;">No bonus tasks available</div>';
        return;
    }
    
    let html = '';
    for (let task of tasks) {
        let completed = userCompletions[task.key];
        let timer = userState.bonusTaskTimers?.[task.key];
        let btnText = 'Start Task';
        let btnDisabled = false;
        let timerHtml = '';
        
        if (completed) {
            btnText = '✅ Completed';
            btnDisabled = true;
        } else if (timer && timer.startTime) {
            let elapsed = Math.floor((Date.now() - timer.startTime) / 1000);
            let timeRequired = task.time || 30;
            if (elapsed >= timeRequired) {
                btnText = 'Claim Reward';
            } else {
                let remaining = timeRequired - elapsed;
                btnText = 'Wait';
                btnDisabled = true;
                timerHtml = `<div class="timer-text">⏳ Wait ${remaining} seconds</div>`;
            }
        }
        
        html += `
            <div class="task-card">
                <img class="task-image" src="${task.image || 'https://via.placeholder.com/60'}" onerror="this.src='https://via.placeholder.com/60'">
                <div class="task-info">
                    <h4>${escapeHtml(task.name || task.title)}</h4>
                    <p>${escapeHtml(task.description || '')}</p>
                    <div class="task-reward">💰 ${task.reward || 0} Coins</div>
                    ${timerHtml}
                </div>
                <button class="task-btn" data-key="${task.key}" data-url="${task.link}" data-reward="${task.reward}" data-time="${task.time || 30}" ${btnDisabled ? 'disabled' : ''}>${btnText}</button>
            </div>
        `;
    }
    container.innerHTML = html;
    
    // Add event listeners
    document.querySelectorAll('.task-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            let key = btn.dataset.key;
            let url = btn.dataset.url;
            let reward = parseInt(btn.dataset.reward);
            let timeRequired = parseInt(btn.dataset.time);
            let completed = userCompletions[key];
            let timer = userState.bonusTaskTimers?.[key];
            
            if (completed) return;
            
            if (timer && timer.startTime) {
                let elapsed = Math.floor((Date.now() - timer.startTime) / 1000);
                if (elapsed >= timeRequired) {
                    // Claim reward
                    if (rewardLock) {
                        showModal("Please wait", "Processing previous request...");
                        return;
                    }
                    rewardLock = true;
                    
                    await db.ref(`users/${tgUser.id}/bonusTaskCompletions/${key}`).set(true);
                    await db.ref(`users/${tgUser.id}/earningWallet`).transaction(v => (v || 0) + reward);
                    await db.ref(`users/${tgUser.id}/totalEarned`).transaction(v => (v || 0) + reward);
                    
                    userState.earningWallet = (userState.earningWallet || 0) + reward;
                    userState.totalEarned = (userState.totalEarned || 0) + reward;
                    
                    await addHistory('Bonus Task', task.name, reward, 'Completed');
                    await processReferralEarnings(tgUser.id, reward, 'Bonus Task');
                    await sendAdminNotification(`🎁 Bonus Task Completed\nUser: ${userState.firstName} (${tgUser.id})\nTask: ${task.name}\nReward: ${reward} Coins`);
                    
                    showModal("Success!", `🎉 +${reward} Coins earned!`);
                    renderAll();
                    renderBonusTasks();
                    
                    rewardLock = false;
                }
            } else {
                // Start task
                if (url) {
                    tg.openLink(url);
                }
                let startTime = Date.now();
                await db.ref(`users/${tgUser.id}/bonusTaskTimers/${key}/startTime`).set(startTime);
                if (!userState.bonusTaskTimers) userState.bonusTaskTimers = {};
                userState.bonusTaskTimers[key] = { startTime };
                renderBonusTasks();
            }
        });
    });
}

// ==================== WITHDRAWAL ====================
async function startWithdraw() {
    let minBalance = appConfig.minWithdrawBalance || 100;
    if ((userState.earningWallet || 0) < minBalance) {
        showModal("Insufficient Balance", `Minimum ${minBalance} coins required for withdrawal.`);
        return;
    }
    
    let methods = appConfig.withdrawBDTMethods || [];
    if (methods.length === 0) {
        showModal("No Methods", "No withdrawal methods available.");
        return;
    }
    
    let method = methods[0];
    let rate = appConfig.coinToBDT || 0.5;
    
    showModal("Withdraw Request", `
        <div style="text-align: left;">
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 6px;">Account Number</label>
                <input type="text" id="withdrawAccount" style="width: 100%; padding: 12px; background: #0F172A; border: 1px solid #334155; border-radius: 12px; color: white;">
            </div>
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 6px;">Amount (Coins)</label>
                <input type="number" id="withdrawAmount" style="width: 100%; padding: 12px; background: #0F172A; border: 1px solid #334155; border-radius: 12px; color: white;" min="${method.min || 100}">
            </div>
            <p style="margin-bottom: 16px;">You will receive: <strong id="fiatAmount">0</strong> BDT</p>
            <button class="watch-btn" onclick="submitWithdraw()">Submit Request</button>
        </div>
    `);
    
    document.getElementById('withdrawAmount')?.addEventListener('input', (e) => {
        let amount = parseFloat(e.target.value) || 0;
        document.getElementById('fiatAmount').innerText = (amount * rate).toFixed(2);
    });
}

async function submitWithdraw() {
    let account = document.getElementById('withdrawAccount')?.value;
    let amount = parseFloat(document.getElementById('withdrawAmount')?.value);
    let methods = appConfig.withdrawBDTMethods || [];
    let method = methods[0];
    let minBalance = appConfig.minWithdrawBalance || 100;
    
    if (!account) {
        showModal("Error", "Please enter account number");
        return;
    }
    if (isNaN(amount) || amount < (method.min || 100)) {
        showModal("Error", `Minimum ${method.min || 100} coins required`);
        return;
    }
    if (amount > (userState.earningWallet || 0)) {
        showModal("Error", "Insufficient balance in earning wallet");
        return;
    }
    
    closeModal();
    
    await db.ref(`users/${tgUser.id}/earningWallet`).set((userState.earningWallet || 0) - amount);
    userState.earningWallet = (userState.earningWallet || 0) - amount;
    
    let reqId = db.ref('withdrawals/pending').push().key;
    await db.ref(`withdrawals/pending/${reqId}`).set({
        id: reqId,
        userId: tgUser.id,
        userName: `${userState.firstName || ''} ${userState.lastName || ''}`,
        method: method.name,
        account: account,
        amount: amount,
        status: 'pending',
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        type: 'bdt'
    });
    
    await sendAdminNotification(`💰 Withdrawal Request\nUser: ${userState.firstName} (${tgUser.id})\nAmount: ${amount} Coins\nMethod: ${method.name}\nAccount: ${account}`);
    
    showModal("Request Submitted", "Your withdrawal request has been submitted for admin approval.");
    renderAll();
}

async function moveToBalance() {
    let minBalance = appConfig.minWithdrawBalance || 100;
    if ((userState.earningWallet || 0) < minBalance) {
        showModal("Insufficient", `Minimum ${minBalance} coins required to move to balance.`);
        return;
    }
    
    let amount = userState.earningWallet;
    await db.ref(`users/${tgUser.id}/balance`).transaction(v => (v || 0) + amount);
    await db.ref(`users/${tgUser.id}/earningWallet`).set(0);
    
    userState.balance = (userState.balance || 0) + amount;
    userState.earningWallet = 0;
    
    showModal("Success", `✅ ${amount} Coins moved to main balance!`);
    renderAll();
}

// ==================== RENDER FUNCTIONS ====================
function renderAdPlatforms() {
    let container = document.getElementById('adPlatforms');
    let adSettings = appConfig.adSettings || {};
    
    let html = '';
    for (let platform of adPlatforms) {
        let isEnabled = adSettings[platform] !== false;
        if (!isEnabled) continue;
        
        let isActive = currentPlatform === platform;
        let displayName = platform.charAt(0).toUpperCase() + platform.slice(1);
        html += `<button class="platform-btn ${isActive ? 'active' : ''}" data-platform="${platform}">${displayName}</button>`;
    }
    container.innerHTML = html;
    
    document.querySelectorAll('.platform-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentPlatform = btn.dataset.platform;
            renderAdPlatforms();
            renderAdCard();
        });
    });
}

function renderAdCard() {
    let container = document.getElementById('adCardContainer');
    let reward = appConfig[`${currentPlatform}Reward`] || 10;
    let dailyLimit = appConfig[`${currentPlatform}DailyLimit`] || 25;
    let currentCount = userState[`${currentPlatform}AdCount`] || 0;
    let remaining = dailyLimit - currentCount;
    
    let icon = '';
    if (currentPlatform === 'monetag') icon = appConfig.monetagPhoto || 'https://img.icons8.com/color/96/play--v1.png';
    else if (currentPlatform === 'gigapub') icon = appConfig.gigapubPhoto || 'https://img.icons8.com/color/96/play--v1.png';
    else if (currentPlatform === 'adsgram') icon = appConfig.adsgramPhoto || 'https://img.icons8.com/color/96/play--v1.png';
    else icon = appConfig.adexiumPhoto || 'https://img.icons8.com/color/96/play--v1.png';
    
    let breakAfter = appConfig[`${currentPlatform}BreakAfter`] || 5;
    let adCountSinceBreak = userState[`${currentPlatform}AdCountSinceBreak`] || 0;
    let breakEnd = userState[`${currentPlatform}BreakEnd`] || 0;
    let isOnBreak = adCountSinceBreak >= breakAfter && Date.now() < breakEnd;
    let timerText = '';
    
    if (isOnBreak) {
        let remainingTime = Math.ceil((breakEnd - Date.now()) / 1000);
        timerText = `<div class="timer-text">⏳ Break: ${formatTime(remainingTime)} remaining</div>`;
    }
    
    container.innerHTML = `
        <div class="ad-card">
            <img class="ad-icon" src="${icon}" onerror="this.src='https://img.icons8.com/color/96/play--v1.png'">
            <h3>${currentPlatform.toUpperCase()} Rewarded Ad</h3>
            <p>Watch video and earn coins instantly!</p>
            <div class="reward-text">💰 +${reward} Coins per ad</div>
            <div class="reward-text" style="font-size: 0.8rem;">📊 Today: ${currentCount}/${dailyLimit} ads</div>
            <button class="watch-btn" onclick="watchAd('${currentPlatform}')" ${isOnBreak ? 'disabled' : ''}>Watch Ad</button>
            ${timerText}
        </div>
    `;
}

function renderAdProgress() {
    let container = document.getElementById('adProgress');
    let html = '';
    
    for (let platform of adPlatforms) {
        let adSettings = appConfig.adSettings || {};
        if (adSettings[platform] === false) continue;
        
        let dailyLimit = appConfig[`${platform}DailyLimit`] || 25;
        let currentCount = userState[`${platform}AdCount`] || 0;
        let percentage = (currentCount / dailyLimit) * 100;
        
        html += `
            <div class="progress-info">
                <span>${platform.toUpperCase()}</span>
                <span>${currentCount}/${dailyLimit}</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: ${percentage}%;"></div>
            </div>
        `;
    }
    container.innerHTML = html;
}

async function renderPendingBanner() {
    let container = document.getElementById('pendingBanner');
    let pendingSnap = await db.ref('withdrawals/pending').orderByChild('userId').equalTo(tgUser.id).once('value');
    let pending = [];
    pendingSnap.forEach(p => pending.push(p.val()));
    
    if (pending.length === 0) {
        container.innerHTML = '';
        return;
    }
    
    let req = pending[0];
    container.innerHTML = `
        <div class="pending-banner">
            <i class="fas fa-hourglass-half"></i>
            <span>Withdrawal of ${req.amount} Coins is pending approval</span>
        </div>
    `;
}

function renderAll() {
    document.getElementById('userAvatar').src = userState.photoUrl || 'https://via.placeholder.com/48';
    document.getElementById('userName').innerHTML = `${userState.firstName || ''} ${userState.lastName || ''}`.trim() || 'User';
    document.getElementById('mainBalance').innerText = (userState.balance || 0).toFixed(0);
    document.getElementById('dailyAds').innerText = userState.dailyAdCount || 0;
    document.getElementById('referralCount').innerText = userState.referrals || 0;
    document.getElementById('earningWallet').innerText = (userState.earningWallet || 0).toFixed(0);
    
    document.getElementById('profileAvatar').src = userState.photoUrl || 'https://via.placeholder.com/100';
    document.getElementById('profileName').innerHTML = `${userState.firstName || ''} ${userState.lastName || ''}`.trim() || 'User';
    document.getElementById('profileId').innerHTML = `ID: ${tgUser.id || ''}`;
    document.getElementById('profileBalance').innerText = (userState.balance || 0).toFixed(0);
    document.getElementById('profileEarning').innerText = (userState.earningWallet || 0).toFixed(0);
    document.getElementById('profileTotalEarned').innerText = (userState.totalEarned || 0).toFixed(0);
    
    let botUsername = appConfig.botUsername || 'YourBot';
    let refLink = `https://t.me/${botUsername}?start=${tgUser.id}`;
    document.getElementById('referralLink').value = refLink;
    
    renderAdPlatforms();
    renderAdCard();
    renderAdProgress();
    renderPendingBanner();
}

// ==================== USER DATA ====================
function captureReferral() {
    let startParam = tg.initDataUnsafe?.start_param;
    if (startParam && !isNaN(startParam) && startParam !== String(tgUser.id)) return startParam;
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get('ref');
    if (ref && !isNaN(ref) && ref !== String(tgUser.id)) return ref;
    return null;
}

async function loadUserData() {
    let ref = db.ref(`users/${tgUser.id}`);
    let snap = await ref.once('value');
    let data = snap.val();
    
    if (!data) {
        let referralId = captureReferral();
        data = {
            id: tgUser.id,
            firstName: tgUser.first_name || '',
            lastName: tgUser.last_name || '',
            username: tgUser.username || '',
            photoUrl: tgUser.photo_url || '',
            balance: 0,
            earningWallet: 0,
            referrals: 0,
            referredBy: referralId || null,
            totalEarned: 0,
            lifetimeAdCount: 0,
            dailyAdCount: 0,
            monetagAdCount: 0,
            gigapubAdCount: 0,
            adsgramAdCount: 0,
            adexiumAdCount: 0,
            monetagAdCountSinceBreak: 0,
            gigapubAdCountSinceBreak: 0,
            adsgramAdCountSinceBreak: 0,
            adexiumAdCountSinceBreak: 0,
            monetagBreakEnd: 0,
            gigapubBreakEnd: 0,
            adsgramBreakEnd: 0,
            adexiumBreakEnd: 0,
            lastAdWatchDate: new Date().toISOString().slice(0, 10),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        
        await ref.set(data);
        
        if (referralId && referralId != tgUser.id && appConfig.referralBonus) {
            let bonus = parseFloat(appConfig.referralBonus);
            if (bonus > 0) {
                await db.ref(`users/${referralId}/earningWallet`).transaction(b => (b || 0) + bonus);
                await db.ref(`users/${referralId}/referrals`).transaction(r => (r || 0) + 1);
                await db.ref(`users/${referralId}/totalEarned`).transaction(v => (v || 0) + bonus);
                await sendAdminNotification(`👥 New Referral\nUser: ${tgUser.first_name} (${tgUser.id}) joined via ${referralId}\nBonus: ${bonus} Coins`);
            } else {
                await db.ref(`users/${referralId}/referrals`).transaction(r => (r || 0) + 1);
            }
        }
        
        await sendAdminNotification(`🆕 New User Joined!\n👤 ${tgUser.first_name} ${tgUser.last_name || ''}\n🆔 ${tgUser.id}\n📅 ${new Date().toLocaleString()}`);
    }
    
    // Reset daily counters if needed
    let today = new Date().toISOString().slice(0, 10);
    if (data.lastAdWatchDate !== today) {
        data.dailyAdCount = 0;
        data.monetagAdCount = 0;
        data.gigapubAdCount = 0;
        data.adsgramAdCount = 0;
        data.adexiumAdCount = 0;
        await ref.update({
            dailyAdCount: 0,
            monetagAdCount: 0,
            gigapubAdCount: 0,
            adsgramAdCount: 0,
            adexiumAdCount: 0,
            lastAdWatchDate: today
        });
    }
    
    userState = data;
}

// ==================== INITIALIZATION ====================
async function loadPopupMessage() {
    let snap = await db.ref('config/popup').once('value');
    let data = snap.val();
    if (data && data.title && data.desc && data.enabled !== false) {
        showModal(data.title, data.desc);
    }
}

async function initApp() {
    tg.ready();
    tg.expand();
    
    tgUser = tg.initDataUnsafe?.user || null;
    
    if (!tgUser) {
        document.getElementById('loader').innerHTML = '<p style="color: #EF4444;">Error: Please open via Telegram</p>';
        return;
    }
    
    // Load config
    let configSnap = await db.ref('config').once('value');
    appConfig = configSnap.val() || {};
    appConfig.adminChatId = appConfig.adminChatId || '8705098472';
    
    await loadUserData();
    
    renderAll();
    renderBonusTasks();
    
    await loadPopupMessage();
    
    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'block';
}

// Navigation
document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
        let page = item.dataset.page;
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        item.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        
        if (page === 'home') {
            document.getElementById('homePage').classList.add('active');
        } else if (page === 'bonus') {
            document.getElementById('bonusPage').classList.add('active');
            renderBonusTasks();
        } else if (page === 'profile') {
            document.getElementById('profilePage').classList.add('active');
        }
    });
});

document.getElementById('walletBtn').onclick = () => startWithdraw();
window.copyReferral = () => {
    let link = document.getElementById('referralLink');
    link.select();
    navigator.clipboard.writeText(link.value);
    showModal("Copied!", "Referral link copied to clipboard!");
};
window.moveToBalance = moveToBalance;
window.submitWithdraw = submitWithdraw;
window.watchAd = watchAd;

// Timer updates
setInterval(() => {
    renderAdCard();
}, 1000);

initApp();
</script>
